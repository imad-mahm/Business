<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <style>
    :root {
      --bg: #0f0f10;
      --surface: #1a1a1c;
      --surface-hover: #232326;
      --border: #2a2a2e;
      --text: #f5f5f4;
      --text-muted: #a1a1aa;
      --accent: #d4a574;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 4rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 4rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .project {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }

    .project:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .project-name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .project-name::after {
      content: "→";
      color: var(--text-muted);
      transition: transform 0.15s ease, color 0.15s ease;
    }

    .project:hover .project-name::after {
      color: var(--accent);
      transform: translateX(4px);
    }

    .project-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    footer {
      margin-top: auto;
      padding-top: 4rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Projects</h1>
    <p class="subtitle">A collection of work.</p>
  </header>

  <main>
    <div class="projects">
      <a class="project" href="Coffee shop/index.html">
        <div class="project-name">Coffee Shop</div>
        <div class="project-desc">Sample coffee shop site with multiple style variants.</div>
      </a>

      <a class="project" href="restaurant/index.html">
        <div class="project-name">Restaurant</div>
        <div class="project-desc">SORREL bistro in five switchable brand directions, each with a live Service Clock and a working reservations/orders flow.</div>
      </a>

      <!--
        To add a new project, copy the block above and update:
          - href="<folder>/index.html"
          - project-name
          - project-desc
      -->
    </div>
  </main>

  <footer>
    <p>imadmahm@gmail.com</p>
  </footer>
</body>
</html>
